# =====================================================================
# stocklab - configuration file
# ---------------------------------------------------------------------
# Every tunable parameter lives here to avoid hard-coding.
# NOTE: never put secrets (webhook URLs, tokens, holdings) in this file.
#       Use environment variables / GitHub Secrets instead
#       (see .env.example).
# =====================================================================

data:
  universe_file: config/universe.csv
  price_lookback_days: 1100        # price history for the daily run (calendar days)
  train_lookback_days: 3700        # price history for training/backtests (~10 years)
  fundamental_refresh_days: 7      # re-fetch fundamentals every N days
  publication_lag_days: 90         # publication lag: point-in-time approximation (leak prevention)
  benchmark: "1306.T"              # benchmark (TOPIX ETF)
  benchmark_alt: "^N225"           # fallback benchmark (Nikkei 225)
  db_path: data/stocklab.db

features:
  momentum_windows: [21, 63, 126]  # ~1/3/6-month momentum (trading days)
  volatility_window: 63
  ma_windows: [20, 75, 200]        # technicals are filters only (never learned weights)
  rsi_window: 14
  rsi_overheat: 80                 # RSI at/above this value = overheated (filtered out)
  winsorize_sigma: 3.0             # clip width after cross-sectional z-scoring (+/- sigma)
  min_turnover_jpy: 100000000      # liquidity filter: 20-day average turnover (JPY)

model:
  horizon_days: 126                # target look-ahead (trading days); e.g. 30/63/126/252
  target_type: excess              # excess = return vs benchmark / absolute = raw return
  candidates: [ridge, lasso, elasticnet, linear]
  min_train_days: 750              # minimum training window for walk-forward (trading days)
  step_days: 63                    # walk-forward retraining interval (trading days)
  model_dir: models
  params:
    ridge: { alpha: 1.0 }
    lasso: { alpha: 0.001, max_iter: 50000 }
    elasticnet: { alpha: 0.001, l1_ratio: 0.5, max_iter: 50000 }
    linear: {}

backtest:
  top_n: 3                         # assume buying the top-N ranked tickers
  holding_days: 126                # holding period (trading days); e.g. 30/63/126/252
  report_dir: reports

risk:
  vol_spike_ratio: 1.8             # 20-day vol >= this multiple of 120-day vol = spike
  volume_dry_ratio: 0.5            # 20-day volume <= this fraction of 120-day avg = dry-up
  drawdown_threshold: 0.25         # flag when decline from 52-week high exceeds this
  notify_threshold: 40             # send an alert when the risk score reaches this value
  check_earnings: true             # earnings-proximity check (yfinance; ignored on failure)
  earnings_within_days: 7
  weights:                         # score contribution of each risk factor
    below_ma200: 25
    vol_spike: 25
    volume_dry: 15
    large_drawdown: 25
    earnings_soon: 10

adoption:                          # model adoption (composite-score weights)
  w_sharpe: 0.4
  w_cagr: 0.2
  w_excess: 0.3
  w_mdd: 0.1
  min_improvement: 0.0             # keep the old model unless improvement exceeds this
