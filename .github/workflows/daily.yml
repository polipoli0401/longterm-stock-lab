name: Daily Analysis

on:
  schedule:
    # Weekdays 18:30 JST (= 09:30 UTC), after the Tokyo market close.
    - cron: "30 9 * * 1-5"
  workflow_dispatch:

permissions:
  contents: write

# Serialize the daily and weekly jobs so their pushes never conflict.
concurrency:
  group: stocklab-pipeline
  cancel-in-progress: false

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e .

      - name: Run daily pipeline
        env:
          # All injected from GitHub Secrets. Unconfigured channels are skipped.
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
          HOLDINGS_JSON: ${{ secrets.HOLDINGS_JSON }}
        run: python main.py

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports models
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: daily analysis $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
