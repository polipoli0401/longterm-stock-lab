name: Weekly Train & Backtest

on:
  schedule:
    # Sundays 06:00 JST (= Saturdays 21:00 UTC), while the market is closed.
    - cron: "0 21 * * 6"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: stocklab-pipeline
  cancel-in-progress: false

jobs:
  train:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install dependencies
        run: pip install -e .

      - name: Train, evaluate and adopt model
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_TO: ${{ secrets.LINE_TO }}
        run: python train.py --notify

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: train-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
          if-no-files-found: ignore

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports models
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "chore: weekly training $(date -u +%Y-%m-%dT%H:%M)"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push
